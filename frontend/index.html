<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מנהל משמרות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen" class="screen active">
  <div class="login-bg">
    <div class="login-orb orb-1"></div>
    <div class="login-orb orb-2"></div>
    <div class="login-orb orb-3"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">📋</div>
      <h1 class="login-title">מנהל משמרות</h1>
      <p class="login-subtitle">מערכת ניהול צוות מתקדמת</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label for="login-username">שם משתמש</label>
        <input type="text" id="login-username" placeholder="הזן שם משתמש..." autocomplete="username" />
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button id="login-btn" class="btn btn-primary btn-full">
        <span>כניסה למערכת</span>
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app-screen" class="screen">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">📋</div>
      <div class="sidebar-brand">
        <span class="brand-name">מנהל משמרות</span>
        <span class="brand-user" id="sidebar-username"></span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="weekly">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>לוח שבועי</span>
      </button>
      <button class="nav-item" data-view="my-schedule" id="nav-my-schedule">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>המשמרות שלי</span>
      </button>
      <button class="nav-item admin-only hidden" data-view="manage-activities">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>ניהול פעילויות</span>
      </button>
      <button class="nav-item admin-only hidden" data-view="manage-users">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>ניהול עובדים</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar-initials"></div>
        <div class="user-info">
          <span class="user-name" id="user-display-name"></span>
          <span class="user-role" id="user-role-label"></span>
        </div>
      </div>
      <button id="logout-btn" class="btn-logout" title="התנתק">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- ===== WEEKLY VIEW ===== -->
    <div id="view-weekly" class="view active">
      <div class="view-header">
        <div class="view-title-group">
          <h2 class="view-title">לוח שבועי</h2>
          <p class="view-subtitle" id="week-label"></p>
        </div>
        <div class="week-controls">
          <button id="prev-week" class="btn btn-ghost btn-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button id="today-btn" class="btn btn-ghost">היום</button>
          <button id="next-week" class="btn btn-ghost btn-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
        </div>
      </div>
      <div class="week-grid" id="week-grid"></div>
    </div>

    <!-- ===== MY SCHEDULE VIEW ===== -->
    <div id="view-my-schedule" class="view">
      <div class="view-header">
        <div class="view-title-group">
          <h2 class="view-title">המשמרות שלי</h2>
          <p class="view-subtitle" id="my-week-label"></p>
        </div>
        <div class="week-controls">
          <button id="my-prev-week" class="btn btn-ghost btn-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button id="my-today-btn" class="btn btn-ghost">היום</button>
          <button id="my-next-week" class="btn btn-ghost btn-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
        </div>
      </div>
      <div id="my-activities-list" class="activities-list"></div>
    </div>

    <!-- ===== MANAGE ACTIVITIES VIEW (admin) ===== -->
    <div id="view-manage-activities" class="view">
      <div class="view-header">
        <div class="view-title-group">
          <h2 class="view-title">ניהול פעילויות</h2>
          <p class="view-subtitle">יצירה, מחיקה ושיבוץ עובדים לפעילויות</p>
        </div>
        <button class="btn btn-primary" id="show-create-activity-form">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>פעילות חדשה</span>
        </button>
      </div>

      <!-- Create Activity Form -->
      <div id="create-activity-form" class="card form-card hidden">
        <h3 class="card-title">יצירת פעילות חדשה</h3>
        <div class="form-grid">
          <div class="form-group">
            <label for="act-title">כותרת הפעילות *</label>
            <input type="text" id="act-title" placeholder="לדוגמה: משמרת בוקר" />
          </div>
          <div class="form-group">
            <label for="act-date">תאריך *</label>
            <input type="date" id="act-date" />
          </div>
          <div class="form-group">
            <label for="act-start">שעת התחלה *</label>
            <input type="time" id="act-start" />
          </div>
          <div class="form-group">
            <label for="act-end">שעת סיום *</label>
            <input type="time" id="act-end" />
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="act-overlap" />
            <span class="checkbox-custom"></span>
            <span>אפשר חפיפה — ניתן להתחבר לפעילות זו במקביל לפעילויות אחרות</span>
          </label>
        </div>
        <div id="create-act-error" class="error-msg hidden"></div>
        <div class="form-actions">
          <button class="btn btn-primary" id="create-activity-btn">צור פעילות</button>
          <button class="btn btn-ghost" id="cancel-create-activity">ביטול</button>
        </div>
      </div>

      <!-- Activities Table -->
      <div class="card">
        <div id="admin-activities-list" class="table-wrapper"></div>
      </div>
    </div>

    <!-- ===== MANAGE USERS VIEW (admin) ===== -->
    <div id="view-manage-users" class="view">
      <div class="view-header">
        <div class="view-title-group">
          <h2 class="view-title">ניהול עובדים</h2>
          <p class="view-subtitle">הוספה ומחיקה של חשבונות עובדים</p>
        </div>
        <button class="btn btn-primary" id="show-add-user-form">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>עובד חדש</span>
        </button>
      </div>

      <div id="add-user-form" class="card form-card hidden">
        <h3 class="card-title">הוספת עובד חדש</h3>
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="new-username">שם משתמש *</label>
            <input type="text" id="new-username" placeholder="הזן שם משתמש..." />
          </div>
        </div>
        <div id="add-user-error" class="error-msg hidden"></div>
        <div class="form-actions">
          <button class="btn btn-primary" id="add-user-btn">הוסף עובד</button>
          <button class="btn btn-ghost" id="cancel-add-user">ביטול</button>
        </div>
      </div>

      <div class="card">
        <div id="users-list" class="table-wrapper"></div>
      </div>
    </div>

  </main>
</div>

<!-- ===== ACTIVITY DETAIL MODAL ===== -->
<div id="activity-modal" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modal-title" class="modal-title"></h3>
      <button id="modal-close" class="btn-icon-close">✕</button>
    </div>
    <div class="modal-body">

      <!-- Info grid -->
      <div class="modal-info-grid">
        <div class="modal-info-item">
          <span class="info-label">תאריך</span>
          <span class="info-value" id="modal-date"></span>
        </div>
        <div class="modal-info-item">
          <span class="info-label">שעות</span>
          <span class="info-value" id="modal-time"></span>
        </div>
        <div class="modal-info-item">
          <span class="info-label">חפיפה</span>
          <span class="info-value" id="modal-overlap"></span>
        </div>
        <div class="modal-info-item">
          <span class="info-label">רשומים</span>
          <span class="info-value" id="modal-count"></span>
        </div>
      </div>

      <!-- Registered workers list -->
      <div class="modal-registrations">
        <h4>עובדים משובצים:</h4>
        <div id="modal-registered-list" class="registered-list"></div>
      </div>

      <!-- ===== ADMIN ASSIGNMENT PANEL ===== -->
      <div id="modal-admin-panel" class="admin-panel hidden">
        <div class="admin-panel-header">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          <span>שיבוץ עובדים</span>
        </div>
        <div class="assign-row">
          <select id="assign-user-select" class="assign-select">
            <option value="">— בחר עובד לשיבוץ —</option>
          </select>
          <button id="assign-user-btn" class="btn btn-primary">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            שבץ
          </button>
        </div>
        <div id="assign-error" class="error-msg hidden" style="margin-top:8px"></div>
      </div>

    </div>
    <!-- Footer: delete activity (admin) OR register/unregister (user) -->
    <div class="modal-footer" id="modal-footer-user">
      <button id="modal-register-btn" class="btn btn-primary btn-full"></button>
    </div>
    <div class="modal-footer modal-footer-admin hidden" id="modal-footer-admin">
      <button id="modal-delete-btn" class="btn btn-danger btn-full">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        מחק פעילות
      </button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast hidden"></div>

<script src="js/app.js"></script>
</body>
</html>
